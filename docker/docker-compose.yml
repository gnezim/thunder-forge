name: thunder-forge

services:
  postgres:
    image: postgres:16-alpine
    container_name: postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: litellm
      POSTGRES_USER: litellm
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-litellm-local}
    volumes:
      - postgres-data:/var/lib/postgresql/data
    ports:
      - "127.0.0.1:${PG_PORT:-5434}:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U litellm"]
      interval: 10s
      timeout: 3s
      retries: 3
    networks: [infra]

  litellm:
    image: ghcr.io/berriai/litellm:main-stable
    container_name: litellm
    restart: unless-stopped
    ports:
      - "4000:4000"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      - ../configs/litellm-config.yaml:/app/config.yaml:ro
      - ./litellm-entrypoint.sh:/litellm-entrypoint.sh:ro
    entrypoint: ["/litellm-entrypoint.sh"]
    command:
      - "litellm"
      - "--config"
      - "/app/config.yaml"
      - "--port"
      - "4000"
      - "--host"
      - "0.0.0.0"
      - "--num_workers"
      - "${LITELLM_WORKERS:-4}"
    environment:
      LITELLM_MASTER_KEY: ${LITELLM_MASTER_KEY:-sk-local-cluster-key}
      DATABASE_URL: postgresql://litellm:${POSTGRES_PASSWORD:-litellm-local}@postgres:5432/litellm
      UI_USERNAME: ${UI_USERNAME:-admin}
      UI_PASSWORD: ${UI_PASSWORD:-changeme}
      FINN_LITELLM_KEY: ${FINN_LITELLM_KEY:-}
    depends_on:
      postgres: { condition: service_healthy }
    healthcheck:
      test: ["CMD", "python", "-c",
        "import urllib.request; urllib.request.urlopen('http://localhost:4000/health/readiness')"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 60s
    networks: [infra]

  openwebui:
    image: ghcr.io/open-webui/open-webui:latest
    container_name: openwebui
    restart: unless-stopped
    ports:
      - "${WEBUI_PORT:-8080}:8080"
    volumes:
      - openwebui-data:/app/backend/data
    environment:
      OPENAI_API_BASE_URLS: ${OPENAI_API_BASE_URLS:-http://litellm:4000/v1}
      OPENAI_API_KEYS: ${LITELLM_MASTER_KEY:-sk-local-cluster-key}
      ENABLE_OLLAMA_API: "false"
      WEBUI_AUTH: ${WEBUI_AUTH:-true}
      WEBUI_SECRET_KEY: ${WEBUI_SECRET_KEY:-change-this-secret}
      WEBUI_NAME: LLM Cluster
      ENABLE_SIGNUP: ${ENABLE_SIGNUP:-true}
    depends_on:
      litellm: { condition: service_healthy }
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:8080/health"]
      interval: 15s
      timeout: 5s
      retries: 3
    networks: [infra]

  admin-ui:
    build:
      context: ..
      dockerfile: admin/Dockerfile
    container_name: admin-ui
    restart: unless-stopped
    network_mode: "host"
    environment:
      DATABASE_URL: postgresql://thunder_admin:${ADMIN_DB_PASSWORD:-admin-local}@localhost:${PG_PORT:-5434}/thunder_admin
      POSTGRES_HOST: localhost
      POSTGRES_PORT: ${PG_PORT:-5434}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-litellm-local}
      ADMIN_DB_PASSWORD: ${ADMIN_DB_PASSWORD:-admin-local}
      GATEWAY_SSH_HOST: ${GATEWAY_SSH_HOST:-localhost}
      GATEWAY_SSH_PORT: ${GATEWAY_SSH_PORT:-22}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD:-}
      GATEWAY_SSH_USER: ${GATEWAY_SSH_USER:?GATEWAY_SSH_USER must be set}
      GATEWAY_SSH_KEY: /ssh/id_ed25519
      THUNDER_FORGE_DIR: ${THUNDER_FORGE_DIR:?THUNDER_FORGE_DIR must be set}
      HF_TOKEN: ${HF_TOKEN:-}
      SESSION_TIMEOUT_HOURS: ${SESSION_TIMEOUT_HOURS:-24}
      DISPLAY_TZ: ${DISPLAY_TZ:-UTC}
      GRAFANA_URL: ${GRAFANA_URL:-}
      OPENWEBUI_URL: ${OPENWEBUI_URL:-http://localhost:8080}
      LITELLM_URL: ${LITELLM_URL:-http://localhost:4000/ui}
    volumes:
      - ${GATEWAY_SSH_KEY:-~/.ssh/id_ed25519}:/ssh/id_ed25519:ro
    depends_on:
      postgres: { condition: service_healthy }
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:8501/_stcore/health"]
      interval: 15s
      timeout: 5s
      retries: 3

networks:
  infra:
    driver: bridge

volumes:
  postgres-data:
  openwebui-data:
