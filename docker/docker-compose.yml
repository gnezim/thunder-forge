name: thunder-forge

services:
  postgres:
    image: postgres:16-alpine
    container_name: postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: litellm
      POSTGRES_USER: litellm
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-litellm-local}
    volumes:
      - postgres-data:/var/lib/postgresql/data
    ports:
      - "127.0.0.1:${PG_PORT:-5432}:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U litellm"]
      interval: 10s
      timeout: 3s
      retries: 3
    networks: [infra]

  litellm:
    image: ghcr.io/berriai/litellm:main-stable
    container_name: litellm
    restart: unless-stopped
    network_mode: host
    volumes:
      - ../configs/litellm-config.yaml:/app/config.yaml:ro
    command:
      - "--config"
      - "/app/config.yaml"
      - "--port"
      - "4000"
      - "--host"
      - "0.0.0.0"
      - "--num_workers"
      - "${LITELLM_WORKERS:-4}"
    environment:
      LITELLM_MASTER_KEY: ${LITELLM_MASTER_KEY:-sk-local-cluster-key}
      DATABASE_URL: postgresql://litellm:${POSTGRES_PASSWORD:-litellm-local}@127.0.0.1:${PG_PORT:-5432}/litellm
      UI_USERNAME: ${UI_USERNAME:-admin}
      UI_PASSWORD: ${UI_PASSWORD:-changeme}
    healthcheck:
      test: ["CMD", "python", "-c",
        "import urllib.request; urllib.request.urlopen('http://localhost:4000/health/readiness')"]
      interval: 15s
      timeout: 5s
      retries: 3

  openwebui:
    image: ghcr.io/open-webui/open-webui:latest
    container_name: openwebui
    restart: unless-stopped
    network_mode: host
    volumes:
      - openwebui-data:/app/backend/data
    environment:
      OPENAI_API_BASE_URLS: http://127.0.0.1:4000/v1
      OPENAI_API_KEYS: ${LITELLM_MASTER_KEY:-sk-local-cluster-key}
      ENABLE_OLLAMA_API: "false"
      WEBUI_AUTH: ${WEBUI_AUTH:-true}
      WEBUI_SECRET_KEY: ${WEBUI_SECRET_KEY:-change-this-secret}
      WEBUI_NAME: LLM Cluster
      ENABLE_SIGNUP: ${ENABLE_SIGNUP:-true}
      PORT: "${WEBUI_PORT:-8080}"
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:${WEBUI_PORT:-8080}/health"]
      interval: 15s
      timeout: 5s
      retries: 3

networks:
  infra:
    driver: bridge

volumes:
  postgres-data:
  openwebui-data:
