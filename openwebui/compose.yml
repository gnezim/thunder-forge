services:
  open-webui:
    build:
      context: .
      dockerfile: Dockerfile
    image: ghcr.io/open-webui/open-webui:main
    container_name: open-webui
    volumes:
      - open-webui:/app/backend/data
    ports:
      - 8333:8080
    environment:
      # mandatory so Open WebUI knows where to persist data
      DATA_DIR: /app/backend/data
      # four Ollama endpoints; adjust hosts/ports as needed
      OLLAMA_BASE_URLS: "http://msm1-fabric:11434;http://msm2-fabric:11434;http://msm3-fabric:11434;http://msm4-fabric:11434"
        
      # VECTOR_DB: qdrant
      # QDRANT_URI: http://192.168.88.167:6333
      # ENABLE_QDRANT_MULTITENANCY_MODE: True
      # QDRANT_COLLECTION_PREFIX: open_webui

      CORS_ALLOW_ORIGIN: "*"
    extra_hosts:
      - host.docker.internal:host-gateway
    restart: unless-stopped

volumes:
  open-webui: {}